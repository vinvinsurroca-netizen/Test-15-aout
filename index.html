<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Invitation Anniversaire</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .box {
            max-width: 700px;
            margin: auto;
            background: rgba(255,255,255,0.15);
            padding: 20px;
            border-radius: 20px;
        }

        video {
            width: 100%;
            border-radius: 15px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>🎉 Invitation Anniversaire 🎉</h1>

        <!-- VIDÉO -->
        <video controls autoplay muted loop>
            <source src="video.mp4" type="video/mp4">
            Ton navigateur ne supporte pas la vidéo.
        </video>

        <p>Tu es invité(e) à mon anniversaire 🥳</p>
    </div>

</body>
</html>
