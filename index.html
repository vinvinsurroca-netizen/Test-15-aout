<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation Anniversaire</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            text-align: center;
            color: #333;
        }

        .container {
            padding: 40px;
        }

        h1 {
            font-size: 3rem;
            color: white;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        .card {
            background: white;
            max-width: 600px;
            margin: auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        img {
            width: 100%;
            border-radius: 15px;
        }

        p {
            font-size: 1.2rem;
            margin-top: 15px;
        }

        .date {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff4d6d;
            margin-top: 10px;
        }

        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: #ff4d6d;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
        }

        .button:hover {
            background: #e63e5c;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🎉 Invitation d'anniversaire 🎉</h1>

        <div class="card">

            <img src="https://images.unsplash.com/photo-1530103862676-de8c9debad1d" alt="Anniversaire">

            <p>
                Tu es invité(e) à mon anniversaire !<br>
                Viens faire la fête avec moi 🎂🥳
            </p>

            <div class="date">
                📅 Samedi 20 juillet à 18h
            </div>

            <p>📍 Chez moi</p>

            <a href="#" class="button">Je viens !</a>

        </div>
    </div>

</body>
</html>
